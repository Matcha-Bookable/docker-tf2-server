name: Keepalive
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  keepalive-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger push.yaml if nearing 45-day expiry
        run: |
          STATE_FILE=".github/tf2-state/last-package-push"
          mkdir -p "$(dirname "$STATE_FILE")"

          if [[ -f "$STATE_FILE" ]]; then
            last_push=$(cat "$STATE_FILE")
          else
            last_push=$(date -u +%s)
            echo "$last_push" > "$STATE_FILE"
            echo "Initialized state file with current timestamp"
          fi

          now=$(date -u +%s)
          days_since=$(( (now - last_push) / 86400 ))
          echo "Days since last package push: $days_since"

          if [ "$days_since" -ge 43 ]; then
            echo "Approaching 45-day limit — triggering push.yaml"
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/push.yaml/dispatches" \
              -d '{"ref":"main"}'

            echo "$(date -u +%s)" > "$STATE_FILE"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$STATE_FILE"
            git commit -m "chore: keepalive push triggered [skip ci]"
            git push
          else
            echo "No keepalive needed ($days_since days since last push)"
          fi
